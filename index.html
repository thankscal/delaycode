<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>航班延誤代碼查詢系統 | 分類篩選 + 搜尋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Noto Sans', 'Inter', 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f0f4f9;
            color: #1e293b;
            padding: 24px 20px 60px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 頭部區域 */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0c3349, #1f5e88);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .header p {
            color: #4a627a;
            margin-top: 8px;
            font-size: 1rem;
        }

        /* 過濾欄容器 */
        .filter-bar {
            background: white;
            border-radius: 48px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.03), 0 1px 4px rgba(0, 0, 0, 0.06);
            padding: 10px 20px 10px 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 32px;
            border: 1px solid #e2edf2;
        }

        .select-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            padding: 4px 12px 4px 18px;
            border-radius: 40px;
            border: 1px solid #e0eaf0;
        }

        .select-wrapper label {
            font-weight: 600;
            color: #2c5a7a;
            font-size: 0.85rem;
        }

        #categorySelect {
            background: transparent;
            border: none;
            padding: 10px 8px 10px 4px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1f4662;
            outline: none;
            cursor: pointer;
            min-width: 200px;
        }

        .search-group {
            flex: 2;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8fafc;
            padding: 4px 16px;
            border-radius: 40px;
            border: 1px solid #e0eaf0;
        }

        .search-icon {
            color: #6c86a3;
            font-size: 1rem;
        }

        #searchInput {
            flex: 1;
            border: none;
            padding: 10px 0;
            font-size: 0.95rem;
            background: transparent;
            outline: none;
            color: #0f2b3d;
        }

        #searchInput::placeholder {
            color: #9aaebf;
        }

        .stats {
            background: #eef2ff;
            padding: 6px 18px;
            border-radius: 34px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1e4a6b;
            white-space: nowrap;
        }

        .reset-btn {
            background: #eef2f9;
            border: none;
            padding: 8px 20px;
            border-radius: 34px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #2c5a7a;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .reset-btn:hover {
            background: #e0e9f2;
            color: #0f3b55;
        }

        /* 分類卡片樣式 */
        .category {
            background: white;
            border-radius: 28px;
            margin-bottom: 32px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.02), 0 1px 3px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid #e6edf2;
        }

        .category-header {
            background: linear-gradient(98deg, #f8fafd 0%, #ffffff 100%);
            padding: 18px 28px;
            border-bottom: 2px solid #dce9f0;
        }

        .category-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            background: linear-gradient(120deg, #1f4e6e, #2c6288);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .category-sub {
            font-size: 0.85rem;
            color: #5c7f9c;
            margin-top: 6px;
            font-weight: 500;
        }

        .codes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px;
            padding: 20px 24px 24px;
        }

        .delay-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 16px 18px;
            transition: all 0.2s ease;
            border: 1px solid #eef3f8;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .delay-card:hover {
            border-color: #cbdde9;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
            transform: translateY(-2px);
            background: #fefefe;
        }

        .code-badge {
            display: inline-block;
            background: #eef2fc;
            font-weight: 800;
            font-size: 1rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            padding: 4px 12px;
            border-radius: 40px;
            color: #1b5a7e;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            border: 0.5px solid #cfe2ed;
        }

        .en-desc {
            font-weight: 600;
            font-size: 0.92rem;
            line-height: 1.4;
            color: #1e3a4d;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .zh-desc {
            font-size: 0.85rem;
            color: #4c6f8c;
            line-height: 1.45;
            border-top: 1px dashed #e4edf3;
            padding-top: 10px;
            margin-top: 4px;
            word-break: break-word;
        }

        .no-results {
            text-align: center;
            padding: 48px 20px;
            background: white;
            border-radius: 48px;
            color: #6c86a3;
            font-weight: 500;
            font-size: 1.1rem;
            margin-top: 20px;
        }

        .footer-note {
            text-align: center;
            margin-top: 40px;
            font-size: 0.75rem;
            color: #7e95ae;
            border-top: 1px solid #dee9f0;
            padding-top: 24px;
        }

        @media (max-width: 720px) {
            body {
                padding: 16px 12px;
            }
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
                border-radius: 32px;
                padding: 16px 20px;
            }
            .select-wrapper, .search-group {
                width: 100%;
            }
            .stats, .reset-btn {
                align-self: flex-start;
            }
            .codes-grid {
                grid-template-columns: 1fr;
                padding: 16px;
            }
            .category-header {
                padding: 14px 20px;
            }
            .category-title {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✈️ 航班延誤歸因代碼庫</h1>
        <p>IATA標準延誤分類 · 依文件順序排列 · 支援類別與關鍵字篩選</p>
    </div>

    <div class="filter-bar">
        <div class="select-wrapper">
            <label>📁 類別：</label>
            <select id="categorySelect"></select>
        </div>
        <div class="search-group">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="輸入代碼 (如 AA, PD, WA) 或中/英文關鍵字..." autocomplete="off">
        </div>
        <div class="stats" id="resultStats">載入中...</div>
        <button class="reset-btn" id="resetBtn">⟳ 重設篩選</button>
    </div>

    <div id="categoriesContainer"></div>
    <div class="footer-note">
        📌 涵蓋機場、機務、貨運、客運、天氣、反應性延誤等全部類別 · 排序依照原始文件順序
    </div>
</div>

        // Flight Operations
        { category: "Flight Operations", categoryZh: "航務", code: "OA", en: "Cockpit crew scheduling or control reason", zh: "飛航組員派遣因素" },
        { category: "Flight Operations", categoryZh: "航務", code: "OB", en: "Late cockpit crew boarding other than standby/ replacement/ connection", zh: "非因轉機或待命臨時調派致飛航組員就工作崗位過遲" },
        { category: "Flight Operations", categoryZh: "航務", code: "OC", en: "Awaiting standby/ replacement/ connection cockpit crew", zh: "因轉機或待命臨時調派致飛航組員就工作崗位過遲" },
        { category: "Flight Operations", categoryZh: "航務", code: "OF", en: "Clarification of documentation (e.g. NOTAM, flights plan, tech-log)", zh: "飛航文件澄清" },
        { category: "Flight Operations", categoryZh: "航務", code: "OG", en: "Special request of cockpit crew NOT within operational requirements", zh: "飛航組員作業範圍外之特別需求" },
        { category: "Flight Operations", categoryZh: "航務", code: "OL", en: "Late pre-flight/walk around check", zh: "飛行前檢查延誤" },
        { category: "Flight Operations", categoryZh: "航務", code: "OO", en: "Cockpit crew reason (specify reason in SI column)", zh: "其他飛航組員之因素 (於備註欄內說明原因)" },
        // Passenger and Baggage
        { category: "Passenger and Baggage", categoryZh: "乘客及行李", code: "PA", en: "Bulky or excessive hand-carry baggage handling", zh: "大件及超額手提行李之處理" },
        { category: "Passenger and Baggage", categoryZh: "乘客及行李", code: "PB", en: "Group late check-in", zh: "團體報到過遲" },
        { category: "Passenger and Baggage", categoryZh: "乘客及行李", code: "PC", en: "Check-in baggage handling (congestion at baggage build-up/transfer area, late in baggage processing or sorting, etc.)", zh: "托運行李處理 (行李處理區壅塞或處理延遲等)" },
        { category: "Passenger and Baggage", categoryZh: "乘客及行李", code: "PD", en: "Passenger cancel trip due to personal reasons", zh: "旅客因個人因素臨時取消行程" },

        { category: "Passenger and Baggage", categoryZh: "乘客及行李", code: "PF", en: "Awaiting baggage from CI/AE flights (including misload of transferred baggage)", zh: "等候CI/AE航班轉來之行李 (包含轉機行李築打因素)" },
        { category: "Passenger and Baggage", categoryZh: "乘客及行李", code: "PG", en: "VIP / commercial publicity / press handling", zh: "貴賓/要員/媒體處理" },

        { category: "Passenger and Baggage", categoryZh: "乘客及行李", code: "PK", en: "Passenger no show (Internet check-in/Group check-in/Escape)", zh: "乘客未報到/登機 (網路報到/團體報到/外勞逃逸)" },
        { category: "Passenger and Baggage", categoryZh: "乘客及行李", code: "PL", en: "Handling sick/injury/deceased passenger", zh: "旅客生病/受傷/死亡處理" },
        { category: "Passenger and Baggage", categoryZh: "乘客及行李", code: "PM", en: "Unruly/drunk passenger handling", zh: "滋擾/酒醉旅客處理" },
        { category: "Passenger and Baggage", categoryZh: "乘客及行李", code: "PN", en: "Awaiting passengers from non-CI/AE flights", zh: "等候非CI/AE航班轉機旅客/行李" },

        // Reactionary (Reactionary Delays)  依照文件順序應在乘客行李之後，客運、運務、天氣等之前
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RA", en: "Late arrival due to airport and governmental authorities", zh: "因機場主管單位延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RB", en: "Late arrival due to insufficient ground / flying time", zh: "因地停/飛時不足延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RC", en: "Late arrival due to catering service", zh: "因餐服延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RD", en: "Late arrival due to aircraft damage", zh: "因飛機損壞延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RE", en: "Late arrival due to in-flight services", zh: "因空服因素延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RF", en: "Late arrival due to cargo", zh: "因貨運延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RJ", en: "Late arrival due to operation dispatch", zh: "因簽派因素延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RL", en: "Late arrival due to loading/unloading", zh: "因裝載因素延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RM", en: "Late arrival due to maintenance", zh: "因機務延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RN", en: "Late arrival due to miscellaneous reasons", zh: "因其他因素延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RO", en: "Late arrival due to flight operations", zh: "因航務延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RP", en: "Late arrival due to passenger and baggage", zh: "因乘客及行李延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RS", en: "Late arrival due to over sale", zh: "因超售延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RT", en: "Late arrival due to traffic", zh: "因航管流量延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RW", en: "Late arrival due to weather impact at original station or flight divert.", zh: "因原站天氣或轉降延誤到站" },
        { category: "Reactionary (Reactionary Delays)", categoryZh: "反應性延誤/前站延遲", code: "RX", en: "Late arrival due to information management systems", zh: "因資訊系統延誤到站" },
        // Marketing and Sales
        { category: "Marketing and Sales", categoryZh: "客運", code: "SA", en: "Overbooking", zh: "班機超售" },
        { category: "Marketing and Sales", categoryZh: "客運", code: "SB", en: "Ticketing or reservation reason", zh: "票務或訂位作業因素" },
        // Traffic
        { category: "Traffic", categoryZh: "運務", code: "TB", en: "Searching for missing passenger", zh: "尋找乘客" },
        { category: "Traffic", categoryZh: "運務", code: "TC", en: "Passenger discrepancies", zh: "乘客登機人數不符" },
        { category: "Traffic", categoryZh: "運務", code: "TD", en: "Reconciling passenger seating", zh: "座位問題處理/調整" },
        { category: "Traffic", categoryZh: "運務", code: "TE", en: "Previous station improper passenger / baggage handling", zh: "前站乘客或行李處置不當" },
        { category: "Traffic", categoryZh: "運務", code: "TF", en: "Check-in reason / negligence", zh: "報到作業因素或疏失" },
        { category: "Traffic", categoryZh: "運務", code: "TG", en: "Late delivery or reason of passenger documents / forms", zh: "艙單、文件或表格遲交因素" },
        { category: "Traffic", categoryZh: "運務", code: "TH", en: "Check-in counters late opening or closing", zh: "報到櫃台開/關過遲" },
        { category: "Traffic", categoryZh: "運務", code: "TJ", en: "Passenger step or shuttle bus late on position", zh: "旅客登機梯或接駁車延遲就位" },
        { category: "Traffic", categoryZh: "運務", code: "TK", en: "Searching for missing passenger due to boarding gate change", zh: "因登機門更改而尋找旅客" },
        { category: "Traffic", categoryZh: "運務", code: "TO", en: "Other reason within Traffic Handling (explain in SI column)", zh: "其他運務作業之因素 (於備註欄內說明原因)" },
        // Weather
        { category: "Weather", categoryZh: "天氣", code: "WA", en: "Ground handling impaired by adverse weather conditions", zh: "天候影響地面作業" },
        { category: "Weather", categoryZh: "天氣", code: "WB", en: "Removal of ice or snow from aircraft", zh: "航機除冰或除雪" },
        { category: "Weather", categoryZh: "天氣", code: "WC", en: "Weather at departure airport below aircraft operating limit or ATC flow control restrictions", zh: "離場站天氣低於航機最低起降標準或航管流量管制" },
        { category: "Weather", categoryZh: "天氣", code: "WD", en: "Weather at destination airport below aircraft operating limit or ATC flow control restrictions", zh: "到場站天氣低於航機最低起降標準或航管流量管制" },
        { category: "Weather", categoryZh: "天氣", code: "WE", en: "En-route conditions below aircraft operating limit or diverted to alternate airport due to weather", zh: "途中天氣低於航機最低操作標準或因天氣因素轉降至備降機場" },
        { category: "Weather", categoryZh: "天氣", code: "WO", en: "Other weather reason (explain in SI column)", zh: "其他天氣因素 (於備註欄內說明原因)" },
        // EDP/Automated Equipment Failure
        { category: "EDP/Automated Equipment Failure", categoryZh: "資訊管理系統", code: "XA", en: "CI computer systems (DCS, Boarding Control System, Reservations System interface) failure/slow response", zh: "本公司電腦系統故障/反應遲緩" },
        { category: "EDP/Automated Equipment Failure", categoryZh: "資訊管理系統", code: "XB", en: "Non-CI computer systems (GHA computer systems, Automated Flight Plan system, CUTE, eWBS) failure/slow response", zh: "非本公司電腦系統故障/反應遲緩" },
        { category: "EDP/Automated Equipment Failure", categoryZh: "資訊管理系統", code: "XC", en: "Communication network (SITA, ACARS, PTT, LAN) failure/slow response", zh: "SITA/ACARS/PTT/LAN 網路系統故障/反應遲緩" }
    ];

    // 依照原始文檔順序定義分類顯示順序 (英文類別名稱)
    const categoryOrder = [
        "Airport and Governmental Authorities",
        "Schedule and Planning",
        "Cabin Cleaning and Catering Service",
        "Damage to Aircraft",
        "In-flight Service",
        "Cargo and Mail",
        "Operation Dispatch",
        "Loading / Unloading",
        "Technical and Aircraft Equipment",
        "Miscellaneous",
        "Flight Operations",
        "Passenger and Baggage",
        "Reactionary (Reactionary Delays)",
        "Marketing and Sales",
        "Traffic",
        "Weather",
        "EDP/Automated Equipment Failure"
    ];

    // 建構分類Map
    const categoryMap = new Map();
    delayData.forEach(item => {
        if (!categoryMap.has(item.category)) {
            categoryMap.set(item.category, { categoryEn: item.category, categoryZh: item.categoryZh, items: [] });
        }
        categoryMap.get(item.category).items.push(item);
    });

    // 依照自定義順序產生選項與渲染用的類別列表 (保留未在順序中的類別，但此處已全部涵蓋)
    const sortedCategoriesForSelect = categoryOrder.filter(cat => categoryMap.has(cat));
    // 若有遺漏則補在最後 (以防萬一)
    const extraCategories = Array.from(categoryMap.keys()).filter(cat => !categoryOrder.includes(cat));
    const finalSortedCategories = [...sortedCategoriesForSelect, ...extraCategories];

    const categorySelect = document.getElementById('categorySelect');
    function buildSelect() {
        let options = '<option value="ALL">📂 全部類別 (所有延誤代碼)</option>';
        for (let catEn of finalSortedCategories) {
            const catInfo = categoryMap.get(catEn);
            if (catInfo) {
                options += `<option value="${escapeHtml(catEn)}">${escapeHtml(catInfo.categoryZh)} · ${escapeHtml(catEn)}</option>`;
            }
        }
        categorySelect.innerHTML = options;
    }
    buildSelect();

    const container = document.getElementById('categoriesContainer');
    const searchInput = document.getElementById('searchInput');
    const resultStats = document.getElementById('resultStats');
    const resetBtn = document.getElementById('resetBtn');

    function render() {
        const selectedCategory = categorySelect.value;
        const searchText = searchInput.value.trim().toLowerCase();
        let totalVisible = 0;
        let html = '';

        let categoriesToShow = [];
        if (selectedCategory === 'ALL') {
            categoriesToShow = finalSortedCategories;
        } else {
            if (categoryMap.has(selectedCategory)) categoriesToShow = [selectedCategory];
            else categoriesToShow = [];
        }

        for (let catEn of categoriesToShow) {
            const catData = categoryMap.get(catEn);
            if (!catData) continue;
            let filteredItems = catData.items.filter(item => {
                if (searchText === '') return true;
                return item.code.toLowerCase().includes(searchText) ||
                       item.en.toLowerCase().includes(searchText) ||
                       item.zh.toLowerCase().includes(searchText);
            });
            if (filteredItems.length === 0) continue;
            totalVisible += filteredItems.length;
            html += `
                <div class="category">
                    <div class="category-header">
                        <div class="category-title">${escapeHtml(catData.categoryZh)} · ${escapeHtml(catEn)}</div>
                        <div class="category-sub">📌 代碼數量：${filteredItems.length}</div>
                    </div>
                    <div class="codes-grid">
            `;
            filteredItems.forEach(item => {
                html += `
                    <div class="delay-card">
                        <div class="code-badge">${escapeHtml(item.code)}</div>
                        <div class="en-desc">${escapeHtml(item.en)}</div>
                        <div class="zh-desc">${escapeHtml(item.zh)}</div>
                    </div>
                `;
            });
            html += `</div></div>`;
        }
        if (totalVisible === 0) {
            html = `<div class="no-results">🔍 沒有符合條件的延誤代碼，請調整篩選條件或關鍵字 ✨</div>`;
        }
        container.innerHTML = html;
        resultStats.innerText = `📋 顯示 ${totalVisible} 條延誤代碼`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function handleFilterChange() {
        render();
    }

    function resetFilters() {
        categorySelect.value = 'ALL';
        searchInput.value = '';
        render();
    }

    categorySelect.addEventListener('change', handleFilterChange);
    searchInput.addEventListener('input', handleFilterChange);
    resetBtn.addEventListener('click', resetFilters);
    render();
</script>
</body>
</html>
